<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סיור וירטואלי 360°</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a202c; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; pointer-events: none; }
        #admin-panel { transition: transform 0.3s ease-in-out; pointer-events: auto; max-height: 100vh; overflow-y: auto; }

        .hotspot-marker {
            position: absolute; transform: translate(-50%, -50%);
            pointer-events: auto; cursor: pointer; transition: transform 0.2s;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.1rem; color: white;
            border-radius: 50%; border: 2px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); width: 40px; height: 40px;
            user-select: none;
        }
        .hotspot-marker:hover { transform: translate(-50%, -50%) scale(1.1); z-index: 20; }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(var(--pulse-color), 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(var(--pulse-color), 0); }
            100% { box-shadow: 0 0 0 0 rgba(var(--pulse-color), 0); }
        }
        .pulsing { animation: pulse-ring 2s infinite; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); z-index: 50; pointer-events: auto; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
        .modal-content { background: white; padding: 2rem; border-radius: 0.75rem; max-width: 800px; width: 90%; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .modal-close { position: absolute; top: 1rem; right: 1rem; cursor: pointer; font-size: 1.5rem; color: #4a5568; background: #e2e8f0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: all 0.2s; }
        .modal-close:hover { background: #ef4444; color: white; }

        .adding-hotspot { cursor: crosshair !important; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* תג מצב מורה */
        #teacher-badge { pointer-events: auto; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui-layer">
    <div id="hotspots-container"></div>
</div>

<!-- כפתור מורה (תמיד גלוי) -->
<div id="teacher-badge" class="fixed bottom-4 left-4 z-40">
    <button id="btn-teacher-login" class="bg-black bg-opacity-50 text-white text-xs px-3 py-1.5 rounded-full hover:bg-opacity-80 transition flex items-center gap-1">
        <i class="fas fa-lock text-xs"></i> מצב מורה
    </button>
</div>

<!-- כפתור פתיחת/סגירת פאנל (רק במצב מורה) -->
<button id="btn-toggle-panel" class="fixed top-4 right-4 z-40 bg-indigo-600 text-white p-3 rounded-full shadow-lg hover:bg-indigo-700 pointer-events-auto flex items-center justify-center w-12 h-12 transition hidden">
    <i class="fas fa-cog text-xl"></i>
</button>

<!-- פאנל ניהול (רק מורה) -->
<div id="admin-panel" class="fixed top-0 right-0 h-full w-80 bg-white shadow-2xl z-30 transform translate-x-full border-l border-gray-200 flex flex-col">
    <div class="p-6 mt-14 flex-1">
        <div class="flex items-center justify-between mb-4 border-b pb-3">
            <h2 class="text-xl font-bold text-gray-800">הגדרות סביבה</h2>
            <button id="btn-teacher-logout" class="text-xs text-gray-400 hover:text-red-500 transition flex items-center gap-1">
                <i class="fas fa-sign-out-alt"></i> יציאה
            </button>
        </div>

        <!-- הגדרות רקע -->
        <div class="mb-5 bg-gray-50 p-4 rounded-lg border border-gray-200">
            <h3 class="font-semibold mb-3 text-indigo-800"><i class="fas fa-image ml-2"></i>תמונת 360°</h3>

            <div class="mb-3">
                <label class="block text-sm font-medium text-gray-700 mb-1">סוג מרחב:</label>
                <select id="env-mode" class="w-full border border-gray-300 rounded p-2 text-sm bg-white outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="360">תמונת 360° אחת</option>
                    <option value="180x2">שתי תמונות 180° (קדמי ואחורי)</option>
                </select>
            </div>

            <div class="mb-3 bg-white p-3 rounded border border-gray-100">
                <label id="label-img-1" class="block text-sm font-bold text-gray-700 mb-2">תמונת 360°:</label>
                <div class="flex mb-2 text-xs">
                    <button class="flex-1 bg-indigo-100 text-indigo-700 py-1 rounded-r border border-indigo-200 font-medium tab-btn active" data-target="img1-file">קובץ</button>
                    <button class="flex-1 bg-gray-100 text-gray-600 py-1 rounded-l border border-gray-200 font-medium tab-btn" data-target="img1-url">קישור</button>
                </div>
                <div id="img1-file" class="tab-content block">
                    <input type="file" id="file-img-1" accept="image/*" class="w-full text-xs text-gray-500 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 mb-2">
                </div>
                <div id="img1-url" class="tab-content hidden">
                    <input type="text" id="url-img-1" placeholder="הדבק קישור לתמונה..." class="w-full border border-gray-300 rounded p-1.5 text-xs mb-2 outline-none">
                </div>
                <button id="btn-set-img-1" class="w-full bg-indigo-500 text-white px-3 py-1.5 rounded hover:bg-indigo-600 text-sm transition">החל תמונה</button>
            </div>

            <div id="section-img-2" class="hidden bg-white p-3 rounded border border-gray-100">
                <label class="block text-sm font-bold text-gray-700 mb-2">תמונה 180° אחורית:</label>
                <div class="flex mb-2 text-xs">
                    <button class="flex-1 bg-indigo-100 text-indigo-700 py-1 rounded-r border border-indigo-200 font-medium tab-btn active" data-target="img2-file">קובץ</button>
                    <button class="flex-1 bg-gray-100 text-gray-600 py-1 rounded-l border border-gray-200 font-medium tab-btn" data-target="img2-url">קישור</button>
                </div>
                <div id="img2-file" class="tab-content block">
                    <input type="file" id="file-img-2" accept="image/*" class="w-full text-xs text-gray-500 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 mb-2">
                </div>
                <div id="img2-url" class="tab-content hidden">
                    <input type="text" id="url-img-2" placeholder="הדבק קישור לתמונה..." class="w-full border border-gray-300 rounded p-1.5 text-xs mb-2 outline-none">
                </div>
                <button id="btn-set-img-2" class="w-full bg-indigo-500 text-white px-3 py-1.5 rounded hover:bg-indigo-600 text-sm transition">החל תמונה אחורית</button>
            </div>
        </div>

        <!-- נקודות חמות -->
        <div class="mb-5 bg-gray-50 p-4 rounded-lg border border-gray-200">
            <h3 class="font-semibold mb-3 text-orange-600"><i class="fas fa-map-pin ml-2"></i>נקודות חמות</h3>
            <button id="btn-start-pin" class="w-full bg-orange-500 text-white px-4 py-2.5 rounded-lg font-bold hover:bg-orange-600 transition flex justify-center items-center">
                <i class="fas fa-thumbtack ml-2"></i> נעץ נקודה חדשה
            </button>
            <p id="pin-hint" class="text-sm text-red-600 mt-2 hidden text-center font-bold bg-red-100 p-2 rounded animate-pulse">
                <i class="fas fa-hand-pointer ml-1"></i> לחץ על מקום במרחב!
            </p>
            <div id="hotspots-list" class="mt-3 max-h-40 overflow-y-auto border-t pt-2 text-sm text-gray-600 space-y-1"></div>
        </div>
    </div>

    <!-- ייצוא -->
    <div class="p-4 border-t bg-gray-50">
        <button id="btn-export" class="w-full bg-green-600 text-white px-4 py-3 rounded-lg font-bold hover:bg-green-700 transition flex justify-center items-center shadow">
            <i class="fas fa-download ml-2"></i> הורד קובץ לפרסום
        </button>
        <a href="https://app.netlify.com/drop" target="_blank" class="mt-2 w-full bg-teal-500 text-white px-4 py-2.5 rounded-lg font-bold hover:bg-teal-600 transition flex justify-center items-center shadow text-sm">
            <i class="fas fa-upload ml-2"></i> פתח את Netlify Drop
        </a>
        <p class="text-xs text-gray-400 mt-2 text-center leading-relaxed">
            גרור את הקובץ לשם וקבל קישור לשיתוף.<br>
            <span class="text-orange-400 font-medium">ללא הרשמה — הקישור פעיל שעה בלבד.</span><br>
            <a href="https://app.netlify.com/signup" target="_blank" class="text-teal-500 underline hover:text-teal-700">הירשם בחינם</a> לקישור קבוע.
        </p>
    </div>
</div>

<!-- מודל סיסמת מורה -->
<div id="password-modal" class="modal-overlay">
    <div class="modal-content" style="max-width:360px;">
        <div id="password-close" class="modal-close"><i class="fas fa-times"></i></div>
        <h2 class="text-xl font-bold mb-4 text-gray-800"><i class="fas fa-lock ml-2 text-indigo-500"></i>כניסת מורה</h2>
        <input type="password" id="password-input" placeholder="הזן סיסמה..." class="w-full border border-gray-300 rounded p-3 mb-3 text-lg outline-none focus:ring-2 focus:ring-indigo-500" autofocus>
        <p id="password-error" class="text-red-500 text-sm mb-3 hidden">סיסמה שגויה</p>
        <button id="btn-password-ok" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">כניסה</button>
        <p class="text-xs text-gray-400 mt-3 text-center">ברירת המחדל: <strong>1234</strong> — שנה בקוד (TEACHER_PASSWORD)</p>
    </div>
</div>

<!-- מודל עריכת נקודה חמה -->
<div id="editor-modal" class="modal-overlay">
    <div class="modal-content" style="max-width:500px;">
        <div id="editor-close" class="modal-close"><i class="fas fa-times"></i></div>
        <h2 class="text-xl font-bold mb-4 text-gray-800 border-b pb-2"><i class="fas fa-edit ml-2 text-orange-500"></i>הגדרת נקודה חמה</h2>
        <div class="space-y-4">
            <div class="flex gap-4">
                <div class="flex-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">תווית (עד 2 תווים):</label>
                    <input type="text" id="hs-label" maxlength="2" value="1" class="w-full text-center border border-gray-300 rounded p-2 text-lg font-bold outline-none focus:ring-2 focus:ring-orange-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">צבע:</label>
                    <input type="color" id="hs-color" value="#f97316" class="w-14 h-10 cursor-pointer rounded border border-gray-300 block">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">כותרת החלונית:</label>
                <input type="text" id="hs-title" class="w-full border border-gray-300 rounded p-2 outline-none focus:ring-2 focus:ring-orange-500" placeholder="למשל: הר הגעש הפעיל">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">תוכן (טקסט, HTML, iframe מ-YouTube...):</label>
                <textarea id="hs-content" rows="5" class="w-full border border-gray-300 rounded p-2 outline-none focus:ring-2 focus:ring-orange-500" placeholder="כתוב טקסט חופשי, או הדבק קוד הטמעה..." dir="auto"></textarea>
            </div>
            <button id="btn-save-hs" class="w-full bg-orange-500 text-white px-4 py-3 rounded-lg font-bold hover:bg-orange-600 transition">
                <i class="fas fa-save ml-2"></i> שמור נקודה
            </button>
        </div>
    </div>
</div>

<!-- מודל תצוגת תלמיד -->
<div id="view-modal" class="modal-overlay">
    <div class="modal-content">
        <div id="view-close" class="modal-close"><i class="fas fa-times"></i></div>
        <h2 id="view-title" class="text-2xl font-bold mb-4 text-gray-800 pr-2 border-b pb-2"></h2>
        <div id="view-body" class="text-gray-800 prose prose-lg max-w-none leading-relaxed" dir="auto"></div>
    </div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // *** שנה את הסיסמה כאן ***
    const TEACHER_PASSWORD = '1234';

    const state = {
        mode: '360',
        images: { img1: null, img2: null },
        hotspots: [],
        isAddingHotspot: false,
        tempPosition: null,
        isTeacher: false
    };

    // --- Three.js ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a202c);
    const camera = new THREE.PerspectiveCamera(90, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 0.1);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableZoom = true;
    controls.minDistance = 0;
    controls.maxDistance = 150;
    controls.enablePan = false;
    controls.rotateSpeed = -0.5;

    let sphere1, sphere2;
    function initSpheres() {
        if (sphere1) scene.remove(sphere1);
        if (sphere2) scene.remove(sphere2);
        if (state.mode === '360') {
            const geo = new THREE.SphereGeometry(500, 60, 40);
            sphere1 = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x888888, wireframe: true, side: THREE.BackSide }));
            sphere1.scale.x = -1;
            scene.add(sphere1);
        } else {
            const geo1 = new THREE.SphereGeometry(500, 60, 40, Math.PI / 2, Math.PI);
            sphere1 = new THREE.Mesh(geo1, new THREE.MeshBasicMaterial({ color: 0x888888, wireframe: true, side: THREE.BackSide }));
            sphere1.scale.x = -1;
            scene.add(sphere1);
            const geo2 = new THREE.SphereGeometry(500, 60, 40, -Math.PI / 2, Math.PI);
            sphere2 = new THREE.Mesh(geo2, new THREE.MeshBasicMaterial({ color: 0x555555, wireframe: true, side: THREE.BackSide }));
            sphere2.scale.x = -1;
            scene.add(sphere2);
        }
    }
    initSpheres();

    function applyTexture(source, targetMesh) {
        if (!source || !targetMesh) return;
        const loader = new THREE.TextureLoader();
        loader.setCrossOrigin("anonymous");
        loader.load(source, (texture) => {
            if (targetMesh.material.map) targetMesh.material.map.dispose();
            targetMesh.material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.BackSide });
        }, undefined, () => alert("שגיאה בטעינת התמונה (ייתכן שהקישור חסום CORS)."));
    }

    // --- מצב מורה/תלמיד ---
    function enterTeacherMode() {
        state.isTeacher = true;
        document.getElementById('btn-toggle-panel').classList.remove('hidden');
        document.getElementById('teacher-badge').innerHTML = `
            <div class="bg-indigo-600 text-white text-xs px-3 py-1.5 rounded-full flex items-center gap-1 shadow">
                <i class="fas fa-chalkboard-teacher text-xs"></i> מצב מורה פעיל
            </div>`;
        openPanel();
    }

    function exitTeacherMode() {
        state.isTeacher = false;
        document.getElementById('btn-toggle-panel').classList.add('hidden');
        closePanel();
        document.getElementById('teacher-badge').innerHTML = `
            <button id="btn-teacher-login" class="bg-black bg-opacity-50 text-white text-xs px-3 py-1.5 rounded-full hover:bg-opacity-80 transition flex items-center gap-1">
                <i class="fas fa-lock text-xs"></i> מצב מורה
            </button>`;
        document.getElementById('btn-teacher-login').addEventListener('click', showPasswordModal);
    }

    let panelOpen = false;
    function openPanel() {
        panelOpen = true;
        document.getElementById('admin-panel').classList.remove('translate-x-full');
    }
    function closePanel() {
        panelOpen = false;
        document.getElementById('admin-panel').classList.add('translate-x-full');
    }

    document.getElementById('btn-toggle-panel').addEventListener('click', () => {
        panelOpen ? closePanel() : openPanel();
    });

    // --- סיסמה ---
    const passwordModal = document.getElementById('password-modal');

    function showPasswordModal() {
        document.getElementById('password-input').value = '';
        document.getElementById('password-error').classList.add('hidden');
        passwordModal.style.display = 'flex';
        setTimeout(() => document.getElementById('password-input').focus(), 100);
    }

    document.getElementById('btn-teacher-login').addEventListener('click', showPasswordModal);
    document.getElementById('password-close').addEventListener('click', () => passwordModal.style.display = 'none');
    passwordModal.addEventListener('click', (e) => { if (e.target === passwordModal) passwordModal.style.display = 'none'; });

    function tryLogin() {
        const val = document.getElementById('password-input').value;
        if (val === TEACHER_PASSWORD) {
            passwordModal.style.display = 'none';
            enterTeacherMode();
        } else {
            document.getElementById('password-error').classList.remove('hidden');
            document.getElementById('password-input').focus();
        }
    }

    document.getElementById('btn-password-ok').addEventListener('click', tryLogin);
    document.getElementById('password-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') tryLogin(); });
    document.getElementById('btn-teacher-logout').addEventListener('click', exitTeacherMode);

    // --- Tabs ---
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const targetId = e.target.getAttribute('data-target');
            const parent = e.target.closest('div').parentElement;
            parent.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('bg-indigo-100', 'text-indigo-700', 'active');
                b.classList.add('bg-gray-100', 'text-gray-600');
            });
            e.target.classList.add('bg-indigo-100', 'text-indigo-700', 'active');
            e.target.classList.remove('bg-gray-100', 'text-gray-600');
            parent.querySelectorAll('.tab-content').forEach(tc => tc.classList.add('hidden'));
            document.getElementById(targetId).classList.remove('hidden');
        });
    });

    // --- תמונות ---
    function getFileOrUrl(fileInputId, urlInputId) {
        return new Promise((resolve) => {
            const fileInput = document.getElementById(fileInputId);
            const urlInput = document.getElementById(urlInputId);
            const parent = fileInput.closest('.bg-white');
            const activeTab = parent.querySelector('.tab-btn.active').getAttribute('data-target');
            if (activeTab.includes('file') && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(fileInput.files[0]);
            } else if (activeTab.includes('url') && urlInput.value.trim()) {
                resolve(urlInput.value.trim());
            } else {
                resolve(null);
            }
        });
    }

    document.getElementById('env-mode').addEventListener('change', (e) => {
        state.mode = e.target.value;
        document.getElementById('section-img-2').classList.toggle('hidden', state.mode !== '180x2');
        document.getElementById('label-img-1').innerText = state.mode === '180x2' ? 'תמונה 180° קדמית:' : 'תמונת 360°:';
        initSpheres();
        if (state.images.img1) applyTexture(state.images.img1, sphere1);
        if (state.images.img2 && state.mode === '180x2') applyTexture(state.images.img2, sphere2);
    });

    document.getElementById('btn-set-img-1').addEventListener('click', async () => {
        const src = await getFileOrUrl('file-img-1', 'url-img-1');
        if (src) { state.images.img1 = src; applyTexture(src, sphere1); }
        else alert("אנא בחר קובץ או הזן קישור.");
    });

    document.getElementById('btn-set-img-2').addEventListener('click', async () => {
        const src = await getFileOrUrl('file-img-2', 'url-img-2');
        if (src) { state.images.img2 = src; applyTexture(src, sphere2); }
        else alert("אנא בחר קובץ או הזן קישור.");
    });

    // --- הוספת נקודות חמות ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const editorModal = document.getElementById('editor-modal');

    document.getElementById('btn-start-pin').addEventListener('click', () => {
        state.isAddingHotspot = true;
        container.classList.add('adding-hotspot');
        const btn = document.getElementById('btn-start-pin');
        btn.classList.replace('bg-orange-500', 'bg-red-500');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin ml-2"></i> לחץ במרחב לנעיצה...';
        document.getElementById('pin-hint').classList.remove('hidden');
    });

    container.addEventListener('click', (event) => {
        if (!state.isAddingHotspot) return;
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const objects = state.mode === '360' ? [sphere1] : [sphere1, sphere2].filter(Boolean);
        const intersects = raycaster.intersectObjects(objects);
        if (intersects.length > 0) {
            state.tempPosition = intersects[0].point;
            state.isAddingHotspot = false;
            container.classList.remove('adding-hotspot');
            const btn = document.getElementById('btn-start-pin');
            btn.classList.replace('bg-red-500', 'bg-orange-500');
            btn.innerHTML = '<i class="fas fa-thumbtack ml-2"></i> נעץ נקודה חדשה';
            document.getElementById('pin-hint').classList.add('hidden');
            document.getElementById('hs-label').value = (state.hotspots.length + 1).toString().substring(0, 2);
            document.getElementById('hs-title').value = '';
            document.getElementById('hs-content').value = '';
            editorModal.style.display = 'flex';
        }
    });

    function hexToRgb(hex) {
        const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return r ? `${parseInt(r[1],16)}, ${parseInt(r[2],16)}, ${parseInt(r[3],16)}` : '255,165,0';
    }

    document.getElementById('btn-save-hs').addEventListener('click', () => {
        const label = document.getElementById('hs-label').value || '*';
        const color = document.getElementById('hs-color').value;
        const title = document.getElementById('hs-title').value;
        const content = document.getElementById('hs-content').value;
        if (!title && !content) { alert('יש להזין כותרת או תוכן.'); return; }
        const id = 'hs_' + Date.now();
        const rgbColor = hexToRgb(color);
        state.hotspots.push({ id, position: { ...state.tempPosition }, title, content, color, rgbColor, label });
        createHotspotDOM(id, title, content, color, rgbColor, label);
        updateHotspotsList();
        editorModal.style.display = 'none';
    });

    document.getElementById('editor-close').addEventListener('click', () => editorModal.style.display = 'none');

    const hotspotsContainer = document.getElementById('hotspots-container');
    function createHotspotDOM(id, title, content, color, rgbColor, label) {
        const el = document.createElement('div');
        el.id = id;
        el.className = 'hotspot-marker pulsing';
        el.style.backgroundColor = color;
        el.style.setProperty('--pulse-color', rgbColor);
        el.innerHTML = label;
        el.title = title;
        el.addEventListener('click', () => openViewModal(title, content));
        hotspotsContainer.appendChild(el);
    }

    function updateHotspotsList() {
        const list = document.getElementById('hotspots-list');
        list.innerHTML = '';
        state.hotspots.forEach((hs, i) => {
            const item = document.createElement('div');
            item.className = 'flex justify-between items-center py-1 border-b border-gray-100 last:border-0';
            item.innerHTML = `
                <div class="flex items-center gap-2">
                    <span class="w-4 h-4 rounded-full inline-block flex-shrink-0" style="background:${hs.color}"></span>
                    <span class="font-bold">${hs.label}</span>
                    <span class="truncate text-gray-500 text-xs">${hs.title || 'ללא כותרת'}</span>
                </div>
                <button class="text-red-400 hover:text-red-600 text-xs flex-shrink-0" data-delete="${hs.id}"><i class="fas fa-trash"></i></button>`;
            list.appendChild(item);
        });
        list.querySelectorAll('[data-delete]').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.getAttribute('data-delete');
                state.hotspots = state.hotspots.filter(h => h.id !== id);
                const el = document.getElementById(id);
                if (el) el.remove();
                updateHotspotsList();
            });
        });
    }

    // --- עדכון מיקומי נקודות ---
    function updateHotspotsScreenPosition() {
        camera.updateMatrixWorld();
        state.hotspots.forEach(hs => {
            const el = document.getElementById(hs.id);
            if (!el) return;
            const vec = new THREE.Vector3(hs.position.x, hs.position.y, hs.position.z);
            vec.project(camera);
            if (vec.z > 1 || vec.z < -1) {
                el.style.display = 'none';
            } else {
                el.style.display = 'flex';
                el.style.left = `${(vec.x * 0.5 + 0.5) * window.innerWidth}px`;
                el.style.top = `${(-(vec.y * 0.5) + 0.5) * window.innerHeight}px`;
            }
        });
    }

    // --- תצוגת תלמיד ---
    const viewModal = document.getElementById('view-modal');
    function openViewModal(title, content) {
        document.getElementById('view-title').innerText = title || '';
        document.getElementById('view-body').innerHTML = content || '';
        viewModal.style.display = 'flex';
    }
    document.getElementById('view-close').addEventListener('click', closeView);
    viewModal.addEventListener('click', (e) => { if (e.target === viewModal) closeView(); });
    function closeView() {
        viewModal.style.display = 'none';
        document.getElementById('view-body').innerHTML = '';
    }

    // --- resize ---
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- אנימציה ---
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        updateHotspotsScreenPosition();
        renderer.render(scene, camera);
    }
    animate();

    // --- ייצוא ---
    document.getElementById('btn-export').addEventListener('click', () => {
        const data = { mode: state.mode, images: state.images, hotspots: state.hotspots };
        const htmlStr = generateStudentHTML(data);
        const blob = new Blob([htmlStr], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'tour360.html';
        a.click();
        URL.revokeObjectURL(url);
    });

    function generateStudentHTML(data) {
        return `<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סיור וירטואלי 360°</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin:0; overflow:hidden; font-family:system-ui,sans-serif; background:#111; }
        #canvas-container { width:100vw; height:100vh; position:absolute; z-index:1; }
        #ui-layer { position:absolute; top:0; left:0; width:100vw; height:100vh; z-index:10; pointer-events:none; }
        .hotspot-marker { position:absolute; transform:translate(-50%,-50%); pointer-events:auto; cursor:pointer; transition:transform 0.2s; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:1.1rem; color:white; border-radius:50%; border:2px solid white; box-shadow:0 4px 6px rgba(0,0,0,0.3); width:40px; height:40px; user-select:none; }
        .hotspot-marker:hover { transform:translate(-50%,-50%) scale(1.15); z-index:20; }
        @keyframes pulse-ring { 0%{box-shadow:0 0 0 0 rgba(var(--pulse-color),.7)} 70%{box-shadow:0 0 0 15px rgba(var(--pulse-color),0)} 100%{box-shadow:0 0 0 0 rgba(var(--pulse-color),0)} }
        .pulsing { animation:pulse-ring 2s infinite; }
        #modal-overlay { display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,.8); z-index:50; justify-content:center; align-items:center; backdrop-filter:blur(4px); pointer-events:auto; }
        #modal-content { background:white; padding:2rem; border-radius:.75rem; max-width:800px; width:90%; max-height:90vh; overflow-y:auto; position:relative; box-shadow:0 25px 50px -12px rgba(0,0,0,.25); }
        #modal-close { position:absolute; top:1rem; right:1rem; cursor:pointer; font-size:1.5rem; color:#4a5568; background:#e2e8f0; width:32px; height:32px; display:flex; align-items:center; justify-content:center; border-radius:50%; }
        #modal-close:hover { background:#ef4444; color:white; }
        h2 { margin-top:0; border-bottom:2px solid #edf2f7; padding-bottom:10px; margin-right:30px; font-family:system-ui,sans-serif; }
        .content-body { line-height:1.7; font-size:1.05rem; font-family:system-ui,sans-serif; }
        .content-body iframe,.content-body img { max-width:100%; border-radius:8px; }
    </style>
    <script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}<\/script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-layer"><div id="hotspots-container"></div></div>
    <div id="modal-overlay">
        <div id="modal-content">
            <div id="modal-close"><i class="fas fa-times"></i></div>
            <h2 id="modal-title"></h2>
            <div id="modal-body" class="content-body" dir="auto"></div>
        </div>
    </div>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        const state = ${JSON.stringify(data)};
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        const camera = new THREE.PerspectiveCamera(90, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0,0,0.1);
        const renderer = new THREE.WebGLRenderer({antialias:true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableZoom=true; controls.minDistance=0; controls.maxDistance=150; controls.enablePan=false; controls.rotateSpeed=-0.5;
        const loader = new THREE.TextureLoader();
        loader.setCrossOrigin("anonymous");
        if (state.mode==='360') {
            const s = new THREE.Mesh(new THREE.SphereGeometry(500,60,40), new THREE.MeshBasicMaterial({color:0x333333,side:THREE.BackSide}));
            s.scale.x=-1; scene.add(s);
            if(state.images.img1) loader.load(state.images.img1, t=>{s.material.map=t;s.material.color.setHex(0xffffff);s.material.needsUpdate=true;});
        } else {
            const m1=new THREE.MeshBasicMaterial({color:0x333333,side:THREE.BackSide});
            const s1=new THREE.Mesh(new THREE.SphereGeometry(500,60,40,Math.PI/2,Math.PI),m1); s1.scale.x=-1; scene.add(s1);
            if(state.images.img1) loader.load(state.images.img1, t=>{m1.map=t;m1.color.setHex(0xffffff);m1.needsUpdate=true;});
            const m2=new THREE.MeshBasicMaterial({color:0x222222,side:THREE.BackSide});
            const s2=new THREE.Mesh(new THREE.SphereGeometry(500,60,40,-Math.PI/2,Math.PI),m2); s2.scale.x=-1; scene.add(s2);
            if(state.images.img2) loader.load(state.images.img2, t=>{m2.map=t;m2.color.setHex(0xffffff);m2.needsUpdate=true;});
        }
        const hsCont = document.getElementById('hotspots-container');
        state.hotspots.forEach(hs => {
            const el=document.createElement('div');
            el.id=hs.id; el.className='hotspot-marker pulsing';
            el.style.backgroundColor=hs.color; el.style.setProperty('--pulse-color',hs.rgbColor); el.innerHTML=hs.label; el.title=hs.title;
            el.addEventListener('click',()=>{ document.getElementById('modal-title').innerText=hs.title; document.getElementById('modal-body').innerHTML=hs.content; document.getElementById('modal-overlay').style.display='flex'; });
            hsCont.appendChild(el);
        });
        const overlay=document.getElementById('modal-overlay');
        document.getElementById('modal-close').addEventListener('click',close);
        overlay.addEventListener('click',e=>{if(e.target===overlay)close();});
        function close(){overlay.style.display='none';document.getElementById('modal-body').innerHTML='';}
        function update(){camera.updateMatrixWorld();state.hotspots.forEach(hs=>{const el=document.getElementById(hs.id);if(!el)return;const v=new THREE.Vector3(hs.position.x,hs.position.y,hs.position.z);v.project(camera);if(v.z>1||v.z<-1){el.style.display='none';}else{el.style.display='flex';el.style.left=\`\${(v.x*.5+.5)*window.innerWidth}px\`;el.style.top=\`\${(-(v.y*.5)+.5)*window.innerHeight}px\`;}});}
        window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
        (function animate(){requestAnimationFrame(animate);controls.update();update();renderer.render(scene,camera);})();
    <\/script>
</body>
</html>`;
    }
</script>
</body>
</html>
